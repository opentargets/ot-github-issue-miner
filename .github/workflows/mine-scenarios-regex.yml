name: Open Targets Scenario Miner (Regex + LLM)

on:
  schedule:
    # Run every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:  # Manual trigger
    inputs:
      days:
        description: "Number of days back to mine (e.g., 7, 30, 90). Leave empty for 90 days."
        required: false
        default: "90"
        type: number

jobs:
  mine-scenarios:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      
      - name: Install dependencies
        run: uv sync
      
      - name: Create results directory
        run: mkdir -p results
      
      - name: Run scenario miner (regex + LLM)
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Get days input or use 90 as default
          DAYS="${{ github.event.inputs.days }}"
          if [ -z "$DAYS" ]; then
            DAYS=90
          fi
          python test_llm_local.py --days "$DAYS" --output-dir ./results --verbose
      
      - name: Upload results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-results
          path: results/
          retention-days: 30
      
      - name: Commit and push results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ 2>/dev/null || true
          git commit -m "chore: update mined scenarios" || echo "No changes to commit"
          git push
