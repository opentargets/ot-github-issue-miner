name: Open Targets Scenario Miner (Regex Only)

on:
  schedule:
    # Run every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:  # Manual trigger
    inputs:
      since_date:
        description: "Start date in DD-MM-YYYY format (e.g., 20-02-2026). Leave empty for 3 months ago."
        required: false
        default: ""

jobs:
  mine-scenarios:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      
      - name: Install dependencies
        run: uv sync
      
      - name: Create results directory
        run: mkdir -p results
      
      - name: Run scenario miner (regex only)
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Get input date or use 3 months ago as default
          INPUT_DATE="${{ github.event.inputs.since_date }}"
          if [ -z "$INPUT_DATE" ]; then
            # Default to 3 months ago in DD-MM-YYYY format
            INPUT_DATE=$(date -u -d '90 days ago' +%d-%m-%Y)
          fi
          # Convert DD-MM-YYYY to YYYY-MM-DD for CLI
          CONVERTED_DATE=$(echo "$INPUT_DATE" | awk -F'-' '{print $3"-"$2"-"$1}')
          .venv/bin/python -m ot_miner.cli --output-dir ./results --no-llm --verbose --since-date "$CONVERTED_DATE"
      
      - name: Upload results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-results
          path: results/
          retention-days: 30
      
      - name: Commit and push results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ 2>/dev/null || true
          git commit -m "chore: update mined scenarios" || echo "No changes to commit"
          git push
